<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0}
html[data-theme='light']{--bg-app:linear-gradient(180deg,#FFFFFF 0%,#F2FBFA 60%,#EDF9F7 100%);--surface:#FFFFFF;--surface2:#F4FAF9;--line:#E2EFEE;--line2:#C9E0DE;--text:#0B2B2A;--muted:#5A7371;--faint:#93A9A7;--primary:#0ABAB5;--on-primary:#FFFFFF;--deep:#06807C;--primary-tint:rgba(10,186,181,.10);--shadow:0 2px 8px rgba(11,43,42,.06)}
html[data-theme='dark']{--bg-app:#0C0C0C;--surface:#0D1F1E;--surface2:#12302E;--line:rgba(255,255,255,0.12);--line2:rgba(255,255,255,0.20);--text:#ECF5F4;--muted:#8FA9A6;--faint:#5C7370;--primary:#2DD4CE;--on-primary:#04211F;--deep:#2DD4CE;--primary-tint:rgba(45,212,206,.14);--shadow:none}
</style>
<script>(function(){var t;try{t=localStorage.getItem('launion-theme')}catch(e){}if(!t)t='dark';document.documentElement.setAttribute('data-theme',t);window.__luSetTheme=function(x){try{localStorage.setItem('launion-theme',x)}catch(e){}document.documentElement.setAttribute('data-theme',x);window.dispatchEvent(new CustomEvent('lu-theme',{detail:x}))};})()</script>
</helmet>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="16" fill="#0ABAB5"/><text x="50" y="66" font-family="Space Grotesk,sans-serif" font-size="52" font-weight="700" fill="#fff" text-anchor="middle">U</text></svg></template>
<div style="min-height:100vh;background:var(--bg-app);font-family:Inter,system-ui,sans-serif;color:var(--text);display:flex;flex-direction:column">

  <div style="flex:none;height:52px;display:flex;align-items:center;gap:16px;padding:0 18px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50">
    <div style="display:flex;align-items:center;gap:9px;flex:none">
      <div style="width:26px;height:26px;border-radius:8px;background:var(--primary);color:var(--on-primary);display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px">U</div>
      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;letter-spacing:.04em;line-height:1.1">LA UNIÓN</div>
        <div style="font-size:9px;color:var(--faint);font-family:'IBM Plex Mono',monospace">Prototipo UX/UI · v1</div>
      </div>
    </div>
    <div style="flex:1;display:flex;justify-content:center;gap:4px">
      <sc-for list="{{ roles }}" as="r" hint-placeholder-count="3">
        <div onClick="{{ r.go }}" style="display:flex;align-items:center;gap:7px;padding:7px 15px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;color:{{ r.fg }};background:{{ r.bg }};border:1px solid {{ r.border }}" style-hover="background:var(--surface2)">
          <span style="width:6px;height:6px;border-radius:99px;background:{{ r.dot }}"></span>{{ r.label }}
          <span style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--faint);font-weight:500">{{ r.device }}</span>
        </div>
      </sc-for>
    </div>
    <div onClick="{{ toggleTheme }}" title="Cambiar tema Light/Dark" style="flex:none;display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:7px 12px;cursor:pointer;color:var(--muted);font-size:12px;font-weight:600" style-hover="background:var(--surface2)">
      <sc-if value="{{ isDark }}" hint-placeholder-val="{{ true }}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg></sc-if>
      <sc-if value="{{ isLight }}" hint-placeholder-val="{{ false }}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path></svg></sc-if>
      {{ themeLabel }}
    </div>
  </div>

  <sc-if value="{{ isVendedor }}" hint-placeholder-val="{{ true }}">
    <div style="flex:1;display:grid;place-items:center;padding:28px 16px">
      <x-import component-from-global-scope="IOSDevice" from="./ios-frame.jsx" dark="{{ isDark }}" hint-size="390px,844px">
        <dc-import name="Vendedor" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
      </x-import>
    </div>
  </sc-if>

  <sc-if value="{{ isRepartidor }}" hint-placeholder-val="{{ false }}">
    <div style="flex:1;display:grid;place-items:center;padding:28px 16px">
      <x-import component-from-global-scope="IOSDevice" from="./ios-frame.jsx" dark="{{ isDark }}" hint-size="390px,844px">
        <dc-import name="Repartidor" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
      </x-import>
    </div>
  </sc-if>

  <sc-if value="{{ isAdmin }}" hint-placeholder-val="{{ false }}">
    <div style="flex:1;display:flex;flex-direction:column;min-width:0">
      <dc-import name="Admin" style="flex:1" hint-size="100%,900px"></dc-import>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;role&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;vendedor&quot;, &quot;repartidor&quot;, &quot;admin&quot;], &quot;default&quot;: &quot;vendedor&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Prototipo&quot;}, &quot;theme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dark&quot;, &quot;light&quot;], &quot;default&quot;: &quot;dark&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Prototipo&quot;}}">
class Component extends DCLogic {
  state = { role: null };

  componentDidMount() {
    this._th = () => this.forceUpdate();
    window.addEventListener('lu-theme', this._th);
    if (this.props.theme) window.__luSetTheme(this.props.theme);
  }
  componentWillUnmount() { window.removeEventListener('lu-theme', this._th); }

  renderVals() {
    const role = this.state.role ?? this.props.role ?? 'vendedor';
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    const defs = [
      ['vendedor', 'Vendedor', 'móvil'],
      ['repartidor', 'Repartidor', 'móvil'],
      ['admin', 'Admin', 'escritorio']
    ];
    return {
      roles: defs.map(([k, label, device]) => ({
        label, device,
        go: () => this.setState({ role: k }),
        fg: role === k ? 'var(--deep)' : 'var(--muted)',
        bg: role === k ? 'var(--primary-tint)' : 'transparent',
        border: role === k ? 'var(--primary)' : 'transparent',
        dot: role === k ? 'var(--primary)' : 'var(--line2)'
      })),
      isVendedor: role === 'vendedor', isRepartidor: role === 'repartidor', isAdmin: role === 'admin',
      isDark, isLight: !isDark,
      themeLabel: isDark ? 'Dark' : 'Light',
      toggleTheme: () => window.__luSetTheme(isDark ? 'light' : 'dark')
    };
  }
}
</script>
</body>
</html>
